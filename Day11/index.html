<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./src/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── TYPOGRAPHY ─────────────────────────────── */
      .anton-font {
        font-family: "Anton", sans-serif;
        font-weight: 400;
        line-height: 0.88;
        letter-spacing: -2px;
        /* mobile */
        font-size: clamp(72px, 22vw, 150px);
      }

      .name-text {
        font-family: "Anton", sans-serif;
        font-weight: 400;
        font-style: italic;
        line-height: 1;
        letter-spacing: -1px;
        font-size: 85px;
        white-space: nowrap;
      }

      /* ── SOCIAL ICON BOX ────────────────────────── */
      .social-box {
        width: 46px;
        height: 46px;
        border: 1.5px solid #4b5563;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        flex-shrink: 0;
      }
      .social-box:hover {
        border-color: #9333ea;
      }
      .social-box svg {
        width: 22px;
        height: 22px;
      }

      html.light .social-box {
        border-color: #d1d5db;
        background-color: #fff;
      }
      html.light .social-box:hover {
        border-color: #111;
      }
      html.light .social-box svg {
        fill: #111;
      }
      html.light .social-box svg.stroke-icon {
        fill: none !important;
        stroke: #111;
      }
      html.light .social-box svg.stroke-icon circle[fill] {
        fill: #111 !important;
      }

      /* ── DOWNLOAD BUTTON ────────────────────────── */
      .download-btn {
        background-color: #1a1a1a;
        color: #fff;
        border: 1px solid #333;
        transition: all 0.2s;
      }
      .download-btn:hover {
        background-color: #252525;
      }
      html.light .download-btn {
        background-color: #fff;
        color: #111;
        border-color: #d1d5db;
      }
      html.light .download-btn:hover {
        background-color: #f9fafb;
        border-color: #111;
      }

      /* ── MOBILE MENU ────────────────────────────── */
      #mobileMenu {
        transform: translateX(100%);
        transition: transform 0.35s ease-in-out;
      }
      #mobileMenu.open {
        transform: translateX(0);
      }

      /* ── THEME ──────────────────────────────────── */
      html.light body {
        background-color: #f5f5f5;
        color: #111;
      }
      html.light .logo-img {
        filter: invert(1) brightness(0);
      }
      html.light .star-icon {
        fill: #111;
      }
      html.light nav a {
        color: #444;
      }
      html.light nav a:hover {
        color: #111;
      }
      html.light #hamburgerBtn {
        color: #111;
      }
    </style>
  </head>

  <body class="bg-black text-white min-h-screen transition-colors duration-300">
    <div class="max-w-[1200px] mx-auto px-6 md:px-10">
      <!-- ══════ NAVBAR ══════════════════════════════ -->
      <header class="flex items-center justify-between py-5">
        <!-- Logo -->
        <img src="assets/Logo.png" class="logo-img h-[24px] md:h-[26px]" />

        <!-- Desktop Nav (hidden on mobile) -->
        <nav class="hidden md:flex gap-8 text-gray-300 text-sm font-medium">
          <a href="#" class="hover:text-white transition-colors">Home</a>
          <a href="#" class="hover:text-white transition-colors">Portfolio</a>
          <a href="#" class="hover:text-white transition-colors">Skills</a>
          <a href="#" class="hover:text-white transition-colors">About Me</a>
        </nav>

        <!-- Desktop Right Controls -->
        <div class="hidden md:flex items-center gap-4">
          <!-- Theme Toggle -->
          <div
            id="themeToggle"
            class="relative w-[52px] h-[28px] bg-yellow-400 rounded-full cursor-pointer transition-colors duration-300"
          >
            <div
              id="toggleCircle"
              class="absolute top-[3px] left-[3px] w-[22px] h-[22px] bg-white rounded-full shadow flex items-center justify-center transition-transform duration-300"
              style="transform: translateX(24px)"
            >
              <svg
                id="moonIcon"
                class="w-[11px] h-[11px] text-gray-800"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
              <svg
                id="sunIcon"
                class="w-[13px] h-[13px] text-yellow-500 hidden"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                />
              </svg>
            </div>
          </div>
          <!-- Contact Button -->
          <button
            class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors"
          >
            Contact Me
          </button>
        </div>

        <!-- Hamburger (mobile only) -->
        <button
          id="hamburgerBtn"
          class="md:hidden p-2 text-white"
          aria-label="Open menu"
        >
          <svg
            class="w-7 h-7"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
      </header>

      <!-- ══════ MOBILE FULLSCREEN MENU ══════════════ -->
      <div
        id="mobileMenu"
        class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center gap-8 md:hidden"
      >
        <button id="closeMenuBtn" class="absolute top-6 right-6 p-2 text-white">
          <svg
            class="w-8 h-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>

        <nav class="flex flex-col items-center gap-7 text-2xl font-semibold">
          <a href="#" class="hover:text-purple-400 transition-colors">Home</a>
          <a href="#" class="hover:text-purple-400 transition-colors"
            >Portfolio</a
          >
          <a href="#" class="hover:text-purple-400 transition-colors">Skills</a>
          <a href="#" class="hover:text-purple-400 transition-colors"
            >About Me</a
          >
        </nav>

        <div class="flex items-center gap-5 mt-4">
          <!-- Mobile Theme Toggle -->
          <div
            id="themeToggleMob"
            class="w-[54px] h-[28px] bg-yellow-400 rounded-full flex items-center px-[3px] cursor-pointer transition-colors duration-300"
          >
            <div
              id="toggleCircleMob"
              class="w-[22px] h-[22px] bg-white rounded-full shadow flex items-center justify-center transition-transform duration-300 translate-x-[26px]"
            >
              <svg
                id="moonIconMob"
                class="w-[11px] h-[11px] text-gray-800"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
              <svg
                id="sunIconMob"
                class="w-[13px] h-[13px] text-yellow-500 hidden"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                />
              </svg>
            </div>
          </div>
          <button
            class="bg-purple-600 hover:bg-purple-700 text-white px-7 py-2.5 rounded-lg font-medium transition-colors"
          >
            Contact Me
          </button>
        </div>
      </div>

      <!-- ══════ HERO ══════════════════════════════════
           Mobile/Tablet: single column, full-width
           Desktop (lg+): two columns with car image
      ════════════════════════════════════════════════ -->
      <section class="mt-6 md:mt-10 pb-16">
        <!-- Two-column wrapper: col layout on lg, stacked otherwise -->
        <div
          class="flex flex-col lg:grid lg:grid-cols-[1fr_auto] lg:gap-10 lg:items-start"
        >
          <!-- ── LEFT CONTENT ──────────────────────── -->
          <div class="relative">
            <!-- Title + Star wrapper -->
            <div class="relative inline-block w-full">
              <h1 class="anton-font">PRODUCT DESIGNER</h1>

              <!-- Star: top-right of the title block -->
              <svg
                class="star-icon absolute top-0 md:right-[10%] lg:right-[-10px] w-[50px] h-[50px] md:w-[70px] md:h-[70px] lg:w-[80px] lg:h-[80px] fill-white"
                viewBox="0 0 160 160"
              >
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M80 160C79.84 115.872 44.0844 80.1483 0 80.1483C44.1828 80.1483 80 44.2642 80 0C80.1593 44.1284 115.916 79.8517 160 79.8517C115.817 79.8517 80 115.736 80 160Z"
                />
              </svg>
            </div>

            <!-- Name -->
            <h2
              class="name-text mt-3 md:mt-5 text-transparent bg-clip-text whitespace-nowrap"
              style="
                background-image: linear-gradient(
                  90deg,
                  #fa709a 0%,
                  #fee140 100%
                );
              "
            >
              CRISTIAN MUÑOZ
            </h2>

            <!-- Social Icons -->
            <div
              class="flex flex-wrap justify-between md:gap-4 mt-8 md:mt-10 w-full lg:max-w-[520px]"
            >
              <!-- Instagram -->
              <div class="social-box">
                <svg
                  class="stroke-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <rect x="2" y="2" width="20" height="20" rx="5" />
                  <circle cx="12" cy="12" r="5" />
                  <circle
                    cx="17.5"
                    cy="6.5"
                    r="1.5"
                    fill="currentColor"
                    stroke="none"
                  />
                </svg>
              </div>
              <!-- Figma -->
              <div class="social-box">
                <svg viewBox="0 0 24 24" fill="white">
                  <path
                    d="M8 2a4 4 0 0 0 0 8h4V2H8zM8 10a4 4 0 0 0 0 8h4v-8H8zM12 2h4a4 4 0 0 1 0 8h-4V2zM12 10h4a4 4 0 0 1 0 8h-4v-8zM8 18a4 4 0 0 0 4 4v-8H8a4 4 0 0 0 0 8z"
                  />
                </svg>
              </div>
              <!-- LinkedIn -->
              <div class="social-box">
                <svg viewBox="0 0 24 24" fill="white">
                  <path
                    d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"
                  />
                </svg>
              </div>
              <!-- Twitter -->
              <div class="social-box">
                <svg viewBox="0 0 24 24" fill="white">
                  <path
                    d="M22.46 6c-.77.35-1.6.58-2.46.69.88-.53 1.56-1.37 1.88-2.38-.83.5-1.75.85-2.72 1.05C18.37 4.5 17.26 4 16 4c-2.35 0-4.27 1.92-4.27 4.29 0 .34.04.67.11.98C8.28 9.09 5.11 7.38 3 4.79c-.37.63-.58 1.37-.58 2.15 0 1.49.75 2.81 1.91 3.56-.71 0-1.37-.2-1.95-.5v.03c0 2.08 1.48 3.82 3.44 4.21a4.22 4.22 0 0 1-1.93.07 4.28 4.28 0 0 0 4 2.98 8.521 8.521 0 0 1-5.33 1.84c-.34 0-.68-.02-1.02-.06C3.44 20.29 5.7 21 8.12 21 16 21 20.33 14.46 20.33 8.79c0-.19 0-.37-.01-.56.84-.6 1.56-1.36 2.14-2.23z"
                  />
                </svg>
              </div>
              <!-- Telegram -->
              <div class="social-box">
                <svg viewBox="0 0 24 24" fill="white">
                  <path
                    d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"
                  />
                </svg>
              </div>
              <!-- Medium -->
              <div class="social-box">
                <svg viewBox="0 0 24 24" fill="white">
                  <path
                    d="M13.54 12a6.8 6.8 0 0 1-6.77 6.82A6.8 6.8 0 0 1 0 12a6.8 6.8 0 0 1 6.77-6.82A6.8 6.8 0 0 1 13.54 12zM20.96 12c0 3.54-1.51 6.42-3.38 6.42-1.87 0-3.39-2.88-3.39-6.42s1.52-6.42 3.39-6.42 3.38 2.88 3.38 6.42M24 12c0 3.17-.53 5.75-1.19 5.75-.66 0-1.19-2.58-1.19-5.75s.53-5.75 1.19-5.75C23.47 6.25 24 8.83 24 12z"
                  />
                </svg>
              </div>
            </div>

            <!-- Download Button -->
            <button
              class="download-btn mt-8 md:mt-10 w-full lg:max-w-[520px] px-6 py-4 text-sm rounded-xl flex items-center justify-center gap-2"
            >
              Download Curriculum Vitae
              <svg
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="10" />
                <path d="M8 12l4 4 4-4M12 8v8" />
              </svg>
            </button>
          </div>

          <!-- ── RIGHT IMAGE (desktop only) ─────────── -->
          <div class="hidden lg:flex justify-end items-start mt-2">
            <img
              src="assets/car.png"
              class="w-[440px] h-[540px] object-cover rounded-xl shadow-2xl"
            />
          </div>
        </div>
      </section>
    </div>

    <!-- ══════ SCRIPTS ══════════════════════════════ -->
    <script>
      // ─── Theme Toggle ───────────────────────────
      let isDark = true;
      const html = document.documentElement;

      function setTheme(dark) {
        isDark = dark;
        if (dark) {
          html.classList.remove("light");
          document.body.style.backgroundColor = "#000";
          document.body.style.color = "#fff";
          // Desktop toggle
          document.getElementById("themeToggle").style.backgroundColor =
            "#facc15";
          document.getElementById("toggleCircle").style.transform =
            "translateX(24px)";
          document.getElementById("moonIcon").classList.remove("hidden");
          document.getElementById("sunIcon").classList.add("hidden");
          // Mobile toggle
          document.getElementById("themeToggleMob").style.backgroundColor =
            "#facc15";
          document.getElementById("toggleCircleMob").style.transform =
            "translateX(26px)";
          document.getElementById("moonIconMob").classList.remove("hidden");
          document.getElementById("sunIconMob").classList.add("hidden");
          // icons
          document
            .querySelectorAll(".social-box svg:not(.stroke-icon)")
            .forEach((svg) => svg.setAttribute("fill", "white"));
          document.querySelectorAll(".stroke-icon").forEach((svg) => {
            svg.setAttribute("stroke", "white");
            svg.querySelector("circle[fill]") &&
              svg.querySelector("circle[fill]").setAttribute("fill", "white");
          });
          document.querySelector(".logo-img").style.filter = "";
          document.getElementById("hamburgerBtn").style.color = "#fff";
        } else {
          html.classList.add("light");
          document.body.style.backgroundColor = "#f5f5f5";
          document.body.style.color = "#111";
          // Desktop toggle
          document.getElementById("themeToggle").style.backgroundColor =
            "#d1d5db";
          document.getElementById("toggleCircle").style.transform =
            "translateX(0)";
          document.getElementById("moonIcon").classList.add("hidden");
          document.getElementById("sunIcon").classList.remove("hidden");
          // Mobile toggle
          document.getElementById("themeToggleMob").style.backgroundColor =
            "#d1d5db";
          document.getElementById("toggleCircleMob").style.transform =
            "translateX(0)";
          document.getElementById("moonIconMob").classList.add("hidden");
          document.getElementById("sunIconMob").classList.remove("hidden");
          // icons
          document
            .querySelectorAll(".social-box svg:not(.stroke-icon)")
            .forEach((svg) => svg.setAttribute("fill", "#111"));
          document.querySelectorAll(".stroke-icon").forEach((svg) => {
            svg.setAttribute("stroke", "#111");
            svg.querySelector("circle[fill]") &&
              svg.querySelector("circle[fill]").setAttribute("fill", "#111");
          });
          document.querySelector(".logo-img").style.filter =
            "invert(1) brightness(0)";
          document.getElementById("hamburgerBtn").style.color = "#111";
        }
      }

      document
        .getElementById("themeToggle")
        .addEventListener("click", () => setTheme(!isDark));
      document
        .getElementById("themeToggleMob")
        .addEventListener("click", () => setTheme(!isDark));

      // ─── Hamburger Menu ─────────────────────────
      const mobileMenu = document.getElementById("mobileMenu");
      const hamburgerBtn = document.getElementById("hamburgerBtn");
      const closeMenuBtn = document.getElementById("closeMenuBtn");

      hamburgerBtn.addEventListener("click", () =>
        mobileMenu.classList.add("open"),
      );
      closeMenuBtn.addEventListener("click", () =>
        mobileMenu.classList.remove("open"),
      );
    </script>
  </body>
</html>
